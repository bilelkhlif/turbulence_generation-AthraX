# ─────────────────────────────────────────────────────────────────
# TurbulenceSimulatorPython — central configuration file
# Edit this file before running run.sh / run_batch.py
# ─────────────────────────────────────────────────────────────────

# ── Paths ─────────────────────────────────────────────────────────
data_path:       "./data"
dataset_det_path: "./dataset/visdrone_det_val"
dataset_path:    "./dataset/visdrone_vid_val"
output_path:     "./outputs"

# ── Dataset ───────────────────────────────────────────────────────
# Full dataset is always processed — no subset selection.
subset_fraction: 1.0

# ── Simulator resolution ──────────────────────────────────────────
# img_size=1024 is used for both images and videos (hard-coded in
# run_batch.py and apply_turbulence_to_video.py).
image_img_size: 1024
video_img_size: 1024

# ── Turbulence presets ────────────────────────────────────────────
# Five fixed presets cycle across images and videos.
# D/r0 stays ≤ 1.5 — realistic for aerial drone footage.
#
#  name         D/r0   L      corr   scale
#  negligible   0.2    500    -0.1   1.0
#  weak         0.5    1000   -0.1   1.0
#  mild         0.8    2000   -0.1   1.0
#  moderate     1.2    3000   -0.1   1.0
#  strong       1.5    3000    0.5   1.0

# ── Hardware ──────────────────────────────────────────────────────
# "cuda" → use first available GPU.  "cpu" → CPU-only.
device: "cuda"
