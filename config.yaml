# ─────────────────────────────────────────────────────────────────
# TurbulenceSimulatorPython — central configuration file
# Edit this file before running run.sh / run_batch.py
# ─────────────────────────────────────────────────────────────────

# ── Paths ─────────────────────────────────────────────────────────
# Where the simulator model artefacts live (P2S_model.pt, dictionary.npy,
# and the auto-generated *.npy correlation matrices).
data_path: "./data"

# Where the VisDrone-DET-val image set will be extracted (auto-downloaded).
# 548 images, ~70 MB — pulled from the public Ultralytics mirror.
dataset_det_path: "./dataset/visdrone_det_val"

# Where the VisDrone-VID-val video set will be extracted.
# Requires manual upload to Google Drive (see run.sh for instructions).
# The download script populates this with sequence sub-folders.
dataset_path: "./dataset/visdrone_vid_val"

# Where to write turbulence-degraded output videos.
# Point this to your rclone-synced folder if desired,
# e.g. "/root/rclone_mount/turbulence_outputs"
output_path: "./outputs"

# ── Dataset ───────────────────────────────────────────────────────
# subset_fraction is kept at 1.0 — the full dataset is always processed.
# select_diverse_clips.py is no longer used; run_batch.py iterates over
# all sequences directly.
subset_fraction: 1.0

# ── Turbulence physics (reference values — not used at runtime) ────
# The image pipeline samples these randomly per image.
# The video pipeline varies them continuously per frame.
# These values are kept here for documentation only.
D_over_r0: 2.0
scale: 1.0
corr: -0.1
L: 3000.0

# ── Simulator resolution ──────────────────────────────────────────
# Internal square resolution fed to the simulator for IMAGES.
# Hard-coded to 1024 in run_batch.py regardless of this value.
image_img_size: 1024

# Internal resolution for VIDEOS.  Hard-coded to 1024 in
# apply_turbulence_to_video.py regardless of this value — kept here
# for documentation and future override support.
video_img_size: 1024

# ── Varying turbulence (video only) ───────────────────────────────
# The interval between parameter changes is drawn uniformly from
# [param_change_min_seconds, param_change_max_seconds] each time.
# At each boundary, new random values for D_over_r0, L, and corr are
# selected and cosine-interpolated toward over the next interval.
param_change_min_seconds: 1
param_change_max_seconds: 30

# ── Hardware ──────────────────────────────────────────────────────
# "cuda" → use first available GPU.  "cpu" → CPU-only.
device: "cuda"
